name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main  # Change this to master if your default branch is master
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Angular App
        run: |
          cd frontend
          # Automatically uses the repository name as base-href for GitHub Pages
          npm run build -- --base-href /${{ github.event.repository.name }}/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist/frontend/browser
          branch: gh-pages
